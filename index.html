<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Dashboard Pro Max</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="bg-container"></div>

    <div class="content-area">
        <div class="header-agenda">
            <h1>Daily Monitor v1.1.0 by dead</h1>
            <div style="display: flex; gap: 10px;">
                <button id="btn-arquivados" class="btn-icon">📁 Histórico</button>
                <button id="btn-configuracoes" class="btn-icon">⚙️ Painel</button>
                <button id="btn-nova-tarefa">+ Novo Alarme</button>
            </div>
        </div>

        <div id="board-container" class="board-container">
        </div>
    </div>

    <div class="footer-area">
        <div id="shopping-container" class="shopping-container">
            <div class="shopping-header">
                🛒 Lista de Compras
                <button id="btn-add-shopping" class="btn-icon" style="padding: 2px 8px; font-size: 0.8rem; margin-left: 10px;">+ Novo</button>
            </div>
            <div id="lista-shopping" class="shopping-list"></div>
        </div>

        <div id="clock-container">00:00</div>

        <div id="momentary-container" class="momentary-container">
            <div class="momentary-header">📌 Notas Rápidas / Momentâneas</div>
            <input type="text" id="input-momentaria" placeholder="Escreva e Enter para adicionar...">
            <div id="lista-momentaneas" class="momentary-list"></div>
        </div>
    </div>

    <div id="modal-tarefa" class="modal">
        <div class="modal-content">
            <h2>Criar Novo Alarme</h2>
            <label>Título da Tarefa:</label>
            <input type="text" id="input-titulo" placeholder="Ex: Tomar remédio">
            <label>Horário:</label>
            <input type="time" id="input-hora">
            <label>Categoria:</label>
            <input type="text" id="input-categoria" placeholder="Ex: Rotina, Saúde...">
            <div class="modal-actions">
                <button id="btn-salvar-tarefa" class="btn-success">Salvar</button>
                <button id="btn-fechar-modal" class="btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-editar" class="modal">
        <div class="modal-content modal-large">
            <h2 id="modal-editar-titulo">Configurar Alarme</h2>

            <div class="linha-flex">
                <label class="toggle-container">
                    <input type="checkbox" id="edit-ativo">
                    <span class="toggle-text">Ativo</span>
                </label>
            </div>

            <label>Título:</label>
            <input type="text" id="edit-titulo">

            <div class="linha-flex" style="gap: 15px;">
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <label>Horário:</label>
                    <input type="time" id="edit-hora">
                </div>
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <label>Categoria:</label>
                    <input type="text" id="edit-categoria">
                </div>
            </div>

            <label>Avisar antes do evento:</label>
            <select id="edit-pre-aviso" class="custom-select">
                <option value="0">Na hora exata</option>
                <option value="15">15 minutos antes</option>
                <option value="30">30 minutos antes</option>
                <option value="45">45 minutos antes</option>
                <option value="60">1 hora antes</option>
            </select>

            <div id="secao-edit-dias">
                <label>Repetir nos dias (Apenas Recorrentes):</label>
                <div class="dias-semana" id="edit-dias">
                    <label><input type="checkbox" value="0"> Dom</label>
                    <label><input type="checkbox" value="1"> Seg</label>
                    <label><input type="checkbox" value="2"> Ter</label>
                    <label><input type="checkbox" value="3"> Qua</label>
                    <label><input type="checkbox" value="4"> Qui</label>
                    <label><input type="checkbox" value="5"> Sex</label>
                    <label><input type="checkbox" value="6"> Sáb</label>
                </div>
            </div>

            <label>Anotações:</label>
            <textarea id="edit-notas" rows="3" placeholder="Insira detalhes..."></textarea>

            <div class="modal-actions">
                <button id="btn-salvar-edicao" class="btn-success">Atualizar</button>
                <button id="btn-fechar-edicao" class="btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-alerta" class="modal" style="z-index: 9999;">
        <div class="modal-content" style="border: 4px solid #ff4444; align-items: center; text-align: center;">
            <h1 class="piscar" style="color: #ff4444; font-size: 3rem; margin: 0;">⏰ ALARME!</h1>
            <h2 id="alerta-titulo" style="font-size: 2rem; margin: 10px 0;">Título</h2>
            <p id="alerta-hora" style="font-size: 1.5rem; opacity: 0.8; margin: 0;"></p>
            <p id="alerta-notas" style="font-size: 1.2rem; color: #aaa; margin-top: 15px;"></p>
            <button id="btn-parar-alarme" class="btn-danger"
                style="font-size: 1.5rem; padding: 15px 30px; margin-top: 25px; width: 100%;">PARAR ALARME</button>
        </div>
    </div>

    <div id="modal-config" class="modal">
        <div class="modal-content modal-large">
            <h2>Configurações do Painel</h2>
            <div class="linha-flex">
                <label class="toggle-container">
                    <input type="checkbox" id="config-autostart">
                    <span class="toggle-text">Iniciar com Windows</span>
                </label>
            </div>
            <label>Monitor Padrão:</label>
            <select id="config-monitor" class="custom-select"></select>
            <label>Saída de Áudio:</label>
            <select id="config-audio" class="custom-select"></select>
            <label>Wallpaper:</label>
            <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                <button id="btn-escolher-wp" class="btn-success" style="flex: 1; font-size: 1rem;">📁 Escolher</button>
                <button id="btn-limpar-wp" class="btn-danger" style="font-size: 1rem;">🗑️ Limpar</button>
            </div>
            <p id="nome-arquivo-escolhido"
                style="margin: 0 0 15px 0; font-size: 0.8rem; color: #aaa; word-break: break-all;">Padrão</p>
            <label style="margin-top: 10px;">Opacidade do Fundo:</label>
            <input type="range" id="config-opacidade" min="0" max="1" step="0.1" value="0.5">
            <div class="modal-actions">
                <button id="btn-salvar-config" class="btn-success">Salvar</button>
                <button id="btn-fechar-config" class="btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-arquivados" class="modal">
        <div class="modal-content modal-large">
            <h2>📁 Histórico de Notas Arquivadas</h2>
            <div id="lista-arquivados" class="archived-list-container"></div>
            <div class="modal-actions">
                <button id="btn-fechar-arquivados" class="btn-danger" style="width: 100%;">Fechar</button>
            </div>
        </div>
    </div>

    <div id="modal-shopping" class="modal">
        <div class="modal-content">
            <h2 id="modal-shopping-titulo">Adicionar Item</h2>
            
            <label>Nome do Item:</label>
            <input type="text" id="shop-nome" placeholder="Ex: Teclado Mecânico">
            
            <div class="linha-flex" style="gap: 15px;">
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <label>Valor:</label>
                    <input type="text" id="shop-valor" placeholder="R$ 0,00">
                </div>
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <label>Quantidade:</label>
                    <input type="number" id="shop-qtd" value="1" min="1">
                </div>
            </div>

            <label>Link de Compra:</label>
            <input type="url" id="shop-link" placeholder="https://...">

            <label>Data Limite:</label>
            <input type="date" id="shop-data">

            <div class="modal-actions">
                <button id="btn-salvar-shopping" class="btn-success">Salvar</button>
                <button id="btn-fechar-shopping" class="btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
